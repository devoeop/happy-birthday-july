<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .landing-content {
      text-align: center;
      padding: 1rem;
    }

    .landing-name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--primary);
      display: block;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
    }

    /* ── CODE HINT ─────────────────────────────────────────── */
    .code-hint {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 1.4rem;
      letter-spacing: 0.03em;
    }

    /* ── OTP BOXES ─────────────────────────────────────────── */
    .code-inputs {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.6rem;
    }

    .code-box {
      width: 52px;
      height: 62px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      font-family: 'Quicksand', sans-serif;
      color: #fff;
      background: rgba(255, 255, 255, 0.10);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      outline: none;
      caret-color: var(--primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      /* Hide number spinners */
      -moz-appearance: textfield;
    }

    .code-box::-webkit-outer-spin-button,
    .code-box::-webkit-inner-spin-button { -webkit-appearance: none; }

    .code-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 14px rgba(255, 105, 180, 0.45);
    }

    /* ── STATES ────────────────────────────────────────────── */
    .code-box.correct {
      border-color: #4ade80;
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.4);
    }

    .code-box.wrong {
      border-color: #f87171;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0);    }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px);  }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px);  }
    }

    /* ── ERROR MSG ─────────────────────────────────────────── */
    .code-error {
      font-size: 0.9rem;
      color: #f87171;
      margin-top: -0.8rem;
      margin-bottom: 1rem;
      min-height: 1.2rem;
      transition: opacity 0.3s ease;
    }

    /* ── MOBILE ────────────────────────────────────────────── */
    @media (max-width: 420px) {
      .code-box { width: 42px; height: 54px; font-size: 1.5rem; border-radius: 10px; }
      .code-inputs { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="bg-image"   id="bgImage"></div>
  <div class="bg-overlay"></div>
  <canvas id="sparkleCanvas"></canvas>
  <div class="hearts-container" id="heartsContainer"></div>

  <main class="page-wrapper">
    <div class="landing-content">
      <h1 class="heading-display" id="landingHeading"></h1>
      <span class="landing-name"  id="landingName"></span>
      <p   class="subtext"        id="landingSubtext"></p>

      <!-- 6-digit code input -->
      <p class="code-hint">Enter the secret code 🔐</p>
      <div class="code-inputs" id="codeInputs">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
        <input class="code-box" type="number" maxlength="1" min="0" max="9" inputmode="numeric">
      </div>
      <p class="code-error" id="codeError"></p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script>
    // Populate from config
    document.title = `Happy Birthday ${CONFIG.name}! 🎂`;
    document.getElementById('landingHeading').textContent = CONFIG.landing.heading;
    document.getElementById('landingName').textContent    = CONFIG.name;
    document.getElementById('landingSubtext').textContent = CONFIG.landing.subtext;
    setBackground(CONFIG.landing.background);

    // ── CODE LOGIC ──────────────────────────────────────────
    const boxes     = Array.from(document.querySelectorAll('.code-box'));
    const errorEl   = document.getElementById('codeError');
    const secretCode = String(CONFIG.landing.secretCode);

    boxes.forEach((box, i) => {

      box.addEventListener('input', () => {
        // Keep only the last digit typed (number inputs can accumulate)
        const val = box.value.replace(/\D/g, '').slice(-1);
        box.value = val;

        if (val) {
          // Auto-advance
          if (i < boxes.length - 1) boxes[i + 1].focus();
          // Check if all filled
          checkCode();
        }
      });

      box.addEventListener('keydown', e => {
        // Backspace clears current and moves back
        if (e.key === 'Backspace') {
          if (!box.value && i > 0) {
            boxes[i - 1].value = '';
            boxes[i - 1].focus();
          }
        }
        // Block non-digit keys (except control keys)
        if (!/^\d$/.test(e.key) && !['Backspace','Tab','ArrowLeft','ArrowRight'].includes(e.key)) {
          e.preventDefault();
        }
      });

      // Clicking a filled box — clear and retype
      box.addEventListener('click', () => box.select());
    });

    function checkCode() {
      const entered = boxes.map(b => b.value).join('');
      if (entered.length < 6) return;

      if (entered === secretCode) {
        // Correct — flash green then navigate
        boxes.forEach(b => b.classList.add('correct'));
        errorEl.textContent = '';
        setTimeout(() => { window.location.href = 'letter.html'; }, 600);
      } else {
        // Wrong — flash red and clear
        boxes.forEach(b => b.classList.add('wrong'));
        errorEl.textContent = 'Wrong code — try again 💔';
        setTimeout(() => {
          boxes.forEach(b => { b.classList.remove('wrong'); b.value = ''; });
          boxes[0].focus();
        }, 700);
      }
    }

    // Auto-focus first box
    boxes[0].focus();
  </script>
</body>
</html>

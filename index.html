<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .landing-content {
      text-align: center;
      padding: 1rem;
    }

    /* Name line beneath the main heading */
    .landing-name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--primary);
      display: block;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>

  <!-- Full-screen background image (opacity controlled by config) -->
  <div class="bg-image"   id="bgImage"></div>
  <!-- Dark overlay layer above image for text readability -->
  <div class="bg-overlay"></div>

  <!-- Sparkle particle canvas -->
  <canvas id="sparkleCanvas"></canvas>

  <!-- Floating hearts -->
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- ── PAGE CONTENT ── -->
  <main class="page-wrapper">
    <div class="landing-content">
      <h1 class="heading-display" id="landingHeading"></h1>
      <span class="landing-name"  id="landingName"></span>
      <p   class="subtext"        id="landingSubtext"></p>
      <button class="btn-primary" id="enterBtn"></button>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script>
    // Populate content from config.js
    document.title = `Happy Birthday ${CONFIG.name}! 🎂`;
    document.getElementById('landingHeading').textContent = CONFIG.landing.heading;
    document.getElementById('landingName').textContent    = CONFIG.name;
    document.getElementById('landingSubtext').textContent = CONFIG.landing.subtext;
    document.getElementById('enterBtn').textContent       = CONFIG.landing.buttonText;

    // Set the background image
    setBackground(CONFIG.landing.background);

    // Go to letter page on button click
    document.getElementById('enterBtn').addEventListener('click', () => {
      window.location.href = 'letter.html';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 📸</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── GALLERY LAYOUT ────────────────────────────────────── */
    .gallery-wrapper {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
    }

    /* ── HERO WISH SECTION ─────────────────────────────────── */
    .gallery-hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .gallery-wish {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      color: #fff;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
      line-height: 1.2;
      margin-bottom: 0.8rem;
      animation: gentlePulse calc(3s * var(--anim-speed)) ease-in-out infinite;
    }

    .gallery-subwish {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.025em;
    }

    /* ── PHOTO GRID ────────────────────────────────────────── */
    /* Responsive: 3 columns on wide, 2 on medium, 1 on mobile */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.6rem;
    }

    /* ── PHOTO CARD ────────────────────────────────────────── */
    .photo-card {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.32s ease, box-shadow 0.32s ease;
    }

    /* hover-lift class toggled via config.animations.cardHoverLift */
    .photo-card.hover-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
    }

    .photo-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo-card.hover-lift:hover img {
      transform: scale(1.05);
    }

    .photo-caption {
      padding: 0.9rem 1.2rem;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.88);
      text-align: center;
      line-height: 1.45;
    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .photo-grid { grid-template-columns: 1fr; }
      .photo-card img { height: 230px; }
    }
  </style>
</head>
<body>

  <!-- Full-screen background image -->
  <div class="bg-image"   id="bgImage"></div>
  <div class="bg-overlay"></div>

  <!-- Effects -->
  <canvas id="sparkleCanvas"></canvas>
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- ── PAGE CONTENT ── -->
  <div class="gallery-wrapper">

    <!-- Birthday wish hero -->
    <div class="gallery-hero">
      <h1 class="gallery-wish"    id="galleryWish"></h1>
      <p  class="gallery-subwish" id="gallerySubwish"></p>
    </div>

    <!-- Photo grid — cards injected by JS below -->
    <div class="photo-grid" id="photoGrid"></div>

  </div>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script>
    const G = CONFIG.gallery;

    // Set wish text from config
    document.title = G.wish;
    document.getElementById('galleryWish').textContent    = G.wish;
    document.getElementById('gallerySubwish').textContent = G.subwish;

    // Build photo cards dynamically from CONFIG.gallery.photos
    const grid      = document.getElementById('photoGrid');
    const hoverCls  = CONFIG.animations.cardHoverLift ? 'hover-lift' : '';

    G.photos.forEach(({ src, caption }) => {
      const card = document.createElement('div');
      card.className = `photo-card ${hoverCls}`.trim();

      const img = document.createElement('img');
      img.src     = src;
      img.alt     = caption;
      img.loading = 'lazy'; // load only when scrolled into view

      const cap = document.createElement('div');
      cap.className   = 'photo-caption';
      cap.textContent = caption;

      card.appendChild(img);
      card.appendChild(cap);
      grid.appendChild(card);
    });

    // Set background from config
    setBackground(G.background);
  </script>
</body>
</html>
